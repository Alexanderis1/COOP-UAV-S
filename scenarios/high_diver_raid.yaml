# High-altitude diving-jet raid + forward CAP sentinels (PHY-SNT-004).
#
# Purpose: exercise the hardest geometry in the threat taxonomy — the jet OWA
# (Geran-3 class, ~100 m/s) that cruises high and dives, faster than any
# 80 m/s interceptor. A lone shooter cannot tail-chase it; only a cooperative
# cutoff posted *ahead* of it can win, and that geometry needs TIME to set up.
# The binding resource is therefore detection range: the base radar fights an
# R^4 falloff and a terrain horizon, so a far, high diver is only confirmed
# once it has eaten most of the corridor.
#
# This scenario stands up a barrier of high-altitude CAP sentinels, already on
# station at t=0, *forward* of the defended area and carrying a look-down
# airborne early-warning radar (sensors/airborne_radar.py). They paint the
# divers seconds-to-tens-of-seconds earlier than the ground set, handing the
# C2 the corridor it needs. Toggle the `sentinels:` block off to A/B the
# effect (see tests/test_airborne_radar.py::test_cap_sentinels_cut_jet_latency).
#
# Map, zones, assets, ground sensors, fleet and turrets mirror
# residential_raid.yaml so the comparison isolates the CAP contribution.

name: high_diver_raid
seed: 7
dt: 0.05
duration: 320.0
record_hz: 5.0

weather:
  wind_speed: 0.0
  wind_dir_deg: 270.0
  fog: 0.0
  precip: 0.0
  daylight: 0.0

comms:
  base_pos: [0.0, -2500.0, 5.0]
  latency_s: 0.01
  jitter_s: 0.0
  base_loss: 0.0
  loss_per_km: 0.0

environment:
  bounds: [-6000.0, -6000.0, 6000.0, 6000.0]
  cell_size: 100.0
  default_zone: DANGEROUS
  zones:
    - { rect: [-6000, -6000,  6000, -3500], class: SAFE }
    - { rect: [-6000,  3500,  6000,  6000], class: SAFE }
    - { rect: [-6000, -6000, -3500,  6000], class: SAFE }
    - { rect: [ 3500, -6000,  6000,  6000], class: SAFE }
    - { rect: [-6000,  -150,  6000,   150], class: SAFE }
    - { rect: [ -400,   300,   200,   900], class: SAFE }
    - { rect: [  300,   900,   900,  1400], class: CRITICAL }   # hospital
    - { rect: [ -900,  -500,  -400,  -100], class: CRITICAL }   # school
    - { rect: [-1600,  1200, -1100,  1700], class: CRITICAL }   # shelter
    - { rect: [  800, -1400,  1700,  -500], class: CRITICAL }   # dense housing

  assets:
    - { name: substation, position: [1500.0,  300.0, 0.0], value: 1.0, radius: 40.0 }
    - { name: depot,      position: [-2000.0, -1500.0, 0.0], value: 0.8, radius: 40.0 }

  buildings:
    - { rect: [  300,   900,   900,  1400], height: 25.0 }
    - { rect: [ -900,  -500,  -400,  -100], height: 12.0 }
    - { rect: [  800, -1400,  1700,  -500], height: 30.0 }
    - { rect: [-1600,  1200, -1100,  1700], height: 10.0 }
    - { rect: [ 1400,   200,  1600,   400], height: 8.0 }

base_station:
  rate_hz: 1.0
  roe:
    max_expected_collateral: 0.30
    max_p_critical: 0.01
    last_resort_time: 25.0
    last_resort_threat: 0.35
    last_resort_collateral: 2.0
    last_resort_p_critical: 0.05

fusion:
  rate_hz: 5.0
  confirm_hits: 3
  max_coast: 5.0

sensors:
  - { type: radar,    name: radar-main, position: [0.0, -2500.0, 15.0], max_range: 12000.0 }
  - { type: rf,       name: rf-df,      position: [0.0, -2500.0, 15.0], max_range: 15000.0 }
  - { type: eo_ir,    name: eo-base,    position: [0.0, -2500.0, 20.0] }
  - { type: eo_ir,    name: eo-substn,  position: [1500.0, 300.0, 20.0] }
  - { type: eo_ir,    name: eo-depot,   position: [-2000.0, -1500.0, 20.0] }
  - { type: acoustic, name: ac-w1, position: [-4500.0, -1000.0, 5.0] }
  - { type: acoustic, name: ac-w2, position: [-3500.0,   200.0, 5.0] }
  - { type: acoustic, name: ac-w3, position: [-3000.0, -1800.0, 5.0] }
  - { type: acoustic, name: ac-nw, position: [-3500.0,  3000.0, 5.0] }

# Forward high-altitude CAP sentinels (PHY-SNT-004). Already on station at
# t=0, well above the ground radar's useful envelope and forward of the city
# on the northern threat axes, each carrying a long look-down airborne radar
# (+ EO/IR for terminal ID). One flies an east-west barrier racetrack across
# the main northern corridor; two flank circles cover the NE/NW diagonals.
# Endurance-class params (slow cruise, big pack) so they hold station through
# the raid.
sentinels:
  - id: cap-north
    home: [0.0, -2500.0, 0.0]
    max_speed: 42.0
    battery_minutes: 150.0
    start_on_station: true
    orbit:
      pattern: racetrack
      center: [0.0, 4200.0]
      heading_deg: 90.0      # legs run east-west, across the north approach
      leg: 3600.0
      radius: 700.0
      alt: 3900.0
      speed: 40.0
    payload:
      - { type: airborne_radar }
      - { type: eo_ir, max_range: 4500.0, full_id_range: 1500.0 }
  - id: cap-ne
    home: [500.0, -2500.0, 0.0]
    max_speed: 40.0
    battery_minutes: 150.0
    start_on_station: true
    orbit:
      center: [3600.0, 3400.0]
      radius: 900.0
      alt: 3700.0
      speed: 36.0
    payload:
      - { type: airborne_radar }
      - { type: eo_ir, max_range: 4500.0, full_id_range: 1500.0 }
  - id: cap-nw
    home: [-500.0, -2500.0, 0.0]
    max_speed: 40.0
    battery_minutes: 150.0
    start_on_station: true
    orbit:
      center: [-3600.0, 3400.0]
      radius: 900.0
      alt: 3700.0
      speed: 36.0
    payload:
      - { type: airborne_radar }
      - { type: eo_ir, max_range: 4500.0, full_id_range: 1500.0 }

interceptors:
  - { id: hawk-1, home: [-500.0, -2500.0, 400.0], effector: projectile, max_speed: 80.0 }
  - { id: hawk-2, home: [-300.0, -2500.0, 400.0], effector: projectile, max_speed: 80.0 }
  - { id: hawk-3, home: [ 300.0, -2500.0, 400.0], effector: projectile, max_speed: 80.0 }
  - { id: hawk-4, home: [ 500.0, -2500.0, 400.0], effector: projectile, max_speed: 80.0 }
  - { id: hawk-5, home: [-2200.0, -1500.0, 400.0], effector: projectile, max_speed: 80.0 }
  - { id: hawk-6, home: [ 1700.0,   300.0, 400.0], effector: projectile, max_speed: 80.0 }
  - { id: net-1,  home: [-100.0, -2500.0, 400.0], effector: net, max_speed: 50.0 }
  - { id: net-2,  home: [ 100.0, -2500.0, 400.0], effector: net, max_speed: 50.0 }

turrets:
  - { id: turret-base,   position: [0.0, -2600.0, 5.0] }
  - { id: turret-substn, position: [1550.0, 250.0, 5.0] }

# Raid: a high-diver-heavy saturation. Three jet OWAs from far, high corners
# arrive bunched with a strategic-OWA + decoy wave, so a late-detected diver
# finds the fleet already committed — the failure mode CAP early warning fixes.
threats:
  # opening strategic wave (NW), mixed with a decoy
  - { time:  8.0, class: OWA_STRATEGIC, spawn: [-5600.0, 5600.0, 1500.0], target: depot }
  - { time: 14.0, class: DECOY,         spawn: [-5400.0, 5600.0, 1450.0], target: depot }
  # the high divers: far, high, from three bearings, arriving together
  - { time: 28.0, class: OWA_JET,       spawn: [   0.0, 5950.0, 4200.0], target: substation }
  - { time: 33.0, class: OWA_JET,       spawn: [ 5200.0, 5200.0, 4500.0], target: substation }
  - { time: 38.0, class: OWA_JET,       spawn: [-5200.0, 5200.0, 4500.0], target: depot }
  # a second strategic pair to keep the shooters busy during the dive window
  - { time: 30.0, class: OWA_STRATEGIC, spawn: [-5800.0, 4800.0, 1500.0], target: substation }
  - { time: 44.0, class: OWA_STRATEGIC, spawn: [ 5600.0, 4800.0, 1500.0], target: depot }
  # low-level western FPV under the radar horizon (acoustic catches it)
  - { time: 60.0, class: FPV,           spawn: [-5500.0, -600.0,   80.0], target: depot }
