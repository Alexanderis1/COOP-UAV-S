  - { id: hawk-16, home: [ 3400.0, 2726.0, 2400.0], effector: projectile, max_speed: 80.0 }

turrets:
  - { id: turret-base,   position: [0.0, -2600.0, 5.0] }
  - { id: turret-substn, position: [1550.0, 250.0, 5.0] }
  - { id: turret-depot,  position: [-2050.0, -1450.0, 5.0] }
  - { id: turret-north,  position: [0.0, 1600.0, 5.0] }

threats:
