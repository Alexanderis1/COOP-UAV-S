  - { id: hawk-1,  home: [-3400.0, 2726.0, 2400.0], effector: projectile, max_speed: 80.0 }
  - { id: hawk-2,  home: [-2947.0, 2856.0, 2400.0], effector: projectile, max_speed: 80.0 }
