# Realistic saturation raid on a single 12 x 12 km defended area.
#
# Sizing rationale (see docs/RESEARCH.md "Raid realism" appendix). Russian
# 2025 raids run 100-800+ Shahed/Gerbera vehicles per NIGHT NATIONWIDE,
# spread over 10+ regions in pulses; 40-60% are Gerbera decoys. For a single
# 144 km^2 city the concurrent load is governed by Little's law:
#   L = arrival_rate x dwell_time,  dwell ~= 12 km / 55 m/s ~= 180 s.
# A heavy, multi-axis saturation pulse against one primary-target city puts
# on the order of 15-30 vehicles airborne over/approaching the box at once,
# 30-40 over the whole engagement, ~40-60% of them decoys. This scenario
# models ~30 vehicles in four overlapping multi-axis waves (12 decoys = 40%,
# 10 strategic OWA, 3 jet OWA, 3 FPV, 2 Lancet).
#
# Defence: a realistic dedicated C-UAS battery for one high-value city —
# 12 Sting-class interceptors (~80 m/s = 288 km/h) on a FORWARD picket arc
# (the geometry that the fleet-size sweep showed beats raw numbers), backed
# by four point-defence turrets on the protected assets.

name: saturation_raid
seed: 11
dt: 0.05
duration: 700.0
record_hz: 5.0

weather:
  wind_speed: 0.0
  wind_dir_deg: 270.0
  fog: 0.0
  precip: 0.0
  daylight: 0.0

comms:
  base_pos: [0.0, -2500.0, 5.0]
  latency_s: 0.01
  jitter_s: 0.0
  base_loss: 0.0
  loss_per_km: 0.0

environment:
  bounds: [-6000.0, -6000.0, 6000.0, 6000.0]
  cell_size: 100.0
  default_zone: DANGEROUS
  zones:
    - { rect: [-6000, -6000,  6000, -3500], class: SAFE }
    - { rect: [-6000,  3500,  6000,  6000], class: SAFE }
    - { rect: [-6000, -6000, -3500,  6000], class: SAFE }
    - { rect: [ 3500, -6000,  6000,  6000], class: SAFE }
    - { rect: [-6000,  -150,  6000,   150], class: SAFE }
    - { rect: [ -400,   300,   200,   900], class: SAFE }
    - { rect: [  300,   900,   900,  1400], class: CRITICAL }   # hospital
    - { rect: [ -900,  -500,  -400,  -100], class: CRITICAL }   # school
    - { rect: [-1600,  1200, -1100,  1700], class: CRITICAL }   # shelter
    - { rect: [  800, -1400,  1700,  -500], class: CRITICAL }   # dense housing

  assets:
    - { name: substation, position: [1500.0,  300.0, 0.0], value: 1.0, radius: 40.0 }
    - { name: depot,      position: [-2000.0, -1500.0, 0.0], value: 0.8, radius: 40.0 }

  buildings:
    - { rect: [  300,   900,   900,  1400], height: 25.0 }
    - { rect: [ -900,  -500,  -400,  -100], height: 12.0 }
    - { rect: [  800, -1400,  1700,  -500], height: 30.0 }
    - { rect: [-1600,  1200, -1100,  1700], height: 10.0 }
    - { rect: [ 1400,   200,  1600,   400], height: 8.0 }

base_station:
  rate_hz: 1.0
  roe:
    max_expected_collateral: 0.30
    max_p_critical: 0.01
    last_resort_time: 25.0
    last_resort_threat: 0.35
    last_resort_collateral: 2.0
    last_resort_p_critical: 0.05

fusion:
  rate_hz: 5.0
  confirm_hits: 3
  max_coast: 5.0

sensors:
  - { type: radar,    name: radar-main, position: [0.0, -2500.0, 15.0], max_range: 12000.0 }
  - { type: rf,       name: rf-df,      position: [0.0, -2500.0, 15.0], max_range: 15000.0 }
  - { type: eo_ir,    name: eo-base,    position: [0.0, -2500.0, 20.0] }
  - { type: eo_ir,    name: eo-substn,  position: [1500.0, 300.0, 20.0] }
  - { type: eo_ir,    name: eo-depot,   position: [-2000.0, -1500.0, 20.0] }
  # forward EO/IR pickets to earn decoy ID before the shooters commit
  - { type: eo_ir,    name: eo-fwd-n,   position: [0.0, 3000.0, 25.0] }
  - { type: eo_ir,    name: eo-fwd-nw,  position: [-2800.0, 2800.0, 25.0] }
  # acoustic pickets covering the low-altitude approaches
  - { type: acoustic, name: ac-w1, position: [-4500.0, -1000.0, 5.0] }
  - { type: acoustic, name: ac-w2, position: [-3500.0,   200.0, 5.0] }
  - { type: acoustic, name: ac-w3, position: [-3000.0, -1800.0, 5.0] }
  - { type: acoustic, name: ac-nw, position: [-3500.0,  3000.0, 5.0] }
  - { type: acoustic, name: ac-ne, position: [ 3000.0,  3000.0, 5.0] }

# 16 Sting-class interceptors (~80 m/s, 288 km/h) on a forward picket arc at
# 2400 m AGL — high enough to meet high-cruising Shaheds (2200 m) and engage
# the jet OWA (2800 m) in its cruise phase before the terminal dive, instead
# of being overflown by a fast target the lower picket could not climb to.
