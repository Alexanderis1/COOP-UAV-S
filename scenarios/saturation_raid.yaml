  - { id: hawk-9,  home: [  227.0, 3297.0, 2400.0], effector: projectile, max_speed: 80.0 }
  - { id: hawk-10, home: [  680.0, 3274.0, 2400.0], effector: projectile, max_speed: 80.0 }
  - { id: hawk-11, home: [ 1133.0, 3229.0, 2400.0], effector: projectile, max_speed: 80.0 }
