# Sentinel surveillance quad (PHY-SNT): the interceptor_quad airframe
# carrying an ENDURANCE pack — 24 Ah vs 16 (hover draw ~34 A -> ~42 min
# hover, the 40-minute surveillance class the legacy battery_minutes=40
# figure pinned). INVENTED-BUT-SELF-CONSISTENT like its parent; flight
# dynamics, motors and bus limits are IDENTICAL by design (idealization:
# the extra pack mass is not modeled, so trim/controller params carry
# over unchanged — the binding claim is endurance class + the shared
# fleet envelope, pinned by tests/test_sitl_airframes.py). Edits here
# intentionally fail those pins until re-baselined.
# Frames: body FLU (x fwd, y left, z up); positions in metres.
name: sentinel_quad
type: multirotor
mass: 12.0                       # kg
inertia_diag: [0.45, 0.45, 0.80] # kg m^2, body FLU principal axes
rotors:
  count: 4
  radius: 0.178                  # m (14" prop)
  kf: 5.4e-5                     # N/(rad/s)^2 thrust coefficient
  km: 1.0e-6                     # N m/(rad/s)^2 drag-torque coefficient (= motor k_q)
  positions:                     # quad-X, body FLU
    - [0.318, -0.318, 0.0]       # front-right
    - [-0.318, 0.318, 0.0]       # back-left
    - [0.318, 0.318, 0.0]        # front-left
    - [-0.318, -0.318, 0.0]      # back-right
  spin: [1, 1, -1, -1]           # +1 = CCW viewed from above (+z up)
motor:                           # P1-3 MotorEsc (k_q is injected = rotors.km)
  kv_rpm_per_v: 320.0
  r_w: 0.040                     # ohm
  j_r: 4.5e-4                    # kg m^2 rotor+prop
battery:                         # P1-3 BatteryEcm, 12S 24 Ah ENDURANCE pack
  n_series: 12
  capacity_ah: 24.0
  r0: 0.036                      # ohm
  r1: 0.018                      # ohm
  c1: 833.33                     # F  (tau1 = R1 C1 ~ 15 s)
powertrain:
  i_bus_max_a: 350.0
drag:
  linear_diag: [0.55, 0.55, 0.10]  # Faessler rotor drag D, N/(m/s), body FLU
  cda_iso: 0.0542                  # m^2
ground_effect:
  model: cheeseman-bennett
  max_gain: 1.5
