# Tier-P interceptor: 12 kg quad-X racer-class, 12S, ~320 KV, T/W ~ 3.6,
# 80 m/s dash at 65 deg tilt. INVENTED-BUT-SELF-CONSISTENT (no public data
# for this class) -- numbers are pinned by tests/test_multirotor.py; edits
# here intentionally fail those pins until re-baselined.
# Frames: body FLU (x fwd, y left, z up); positions in metres.
name: interceptor_quad
type: multirotor
mass: 12.0                       # kg
inertia_diag: [0.45, 0.45, 0.80] # kg m^2, body FLU principal axes
rotors:
  count: 4
  radius: 0.178                  # m (14" prop)
  kf: 5.4e-5                     # N/(rad/s)^2 thrust coefficient
  km: 1.0e-6                     # N m/(rad/s)^2 drag-torque coefficient (= motor k_q)
  positions:                     # quad-X, body FLU
    - [0.318, -0.318, 0.0]       # front-right
    - [-0.318, 0.318, 0.0]       # back-left
    - [0.318, 0.318, 0.0]        # front-left
    - [-0.318, -0.318, 0.0]      # back-right
  spin: [1, 1, -1, -1]           # +1 = CCW viewed from above (+z up)
motor:                           # P1-3 MotorEsc (k_q is injected = rotors.km)
  kv_rpm_per_v: 320.0            # KNOWN LIMITATION (kept as-is): with r_w/km/12S
                                 # this implies a full-throttle ceiling ~1400 rad/s
                                 # = 13.4 krpm -> tip Mach ~0.73 on the 14" prop
                                 # (stiff 44.4 V bus; ~M 0.59-0.69 with pack sag),
                                 # ~1.7x class prop rpm ratings; constant kf/km
                                 # degrades at the 80 m/s dash (helical tip M ~0.8).
                                 # Hover (M ~0.38) fine. See RESEARCH.md "Known
                                 # model-validity limitations".
  r_w: 0.040                     # ohm
  j_r: 4.5e-4                    # kg m^2 rotor+prop
battery:                         # P1-3 BatteryEcm, 12S 16 Ah pack
  n_series: 12
  capacity_ah: 16.0
  r0: 0.036                      # ohm
  r1: 0.018                      # ohm
  c1: 833.33                     # F  (tau1 = R1 C1 ~ 15 s)
powertrain:                      # Powertrain implicit bus solve (own block:
  i_bus_max_a: 350.0             #   battery: is splatted into BatteryEcm).
                                 # A; ESC/BMS bus limit ~1.5x the 234 A
                                 # self-consistent steady full-throttle draw
drag:
  linear_diag: [0.55, 0.55, 0.10]  # Faessler rotor drag D, N/(m/s), body FLU
  cda_iso: 0.0542                  # m^2, isotropic parasitic 0.5 rho CdA |v| v
                                   # tuned: 80.0 m/s terminal at 65 deg tilt, ISA 200 m
ground_effect:
  model: cheeseman-bennett
  max_gain: 1.5
